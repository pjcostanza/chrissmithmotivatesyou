<body>
  <!-- NAVBAR (Contact highlighted) -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html" aria-label="Chris Smith Motivates You home">
 	 <img class="brand-wordmark"
     	 	src="assets/img/logo-wordmark.png"
      	 	alt="Chris Smith Motivates You">
	</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#primaryNav"
              aria-controls="primaryNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="primaryNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html" aria-current="page">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="section section--alt">
    <div class="container">
      <h1 class="mb-2">Contact</h1>
      <p class="text-muted mb-0">Send a message — Formspree handles delivery without a backend.</p>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-5">
          <div class="card card-premium p-4">
            <h2 class="h5 mb-2">Contact details</h2>
            <p class="text-muted mb-0 is-placeholder">
              Add your email / phone / hours here (or keep it form-only).
            </p>
          </div>
        </div>

        <div class="col-lg-7">
          <div class="card card-premium p-4 p-md-5">
            <form action="https://formspree.io/f/meerqrro" method="POST">
              <div class="d-none" aria-hidden="true">
                <label>Leave this field empty: <input type="text" name="_gotcha"></label>
              </div>

              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input class="form-control" id="name" name="name" type="text" autocomplete="name" required>
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input class="form-control" id="email" name="email" type="email" autocomplete="email" required>
              </div>

              <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <textarea class="form-control" id="message" name="message" rows="6" required></textarea>
              </div>

              <button class="btn btn-brand btn-lg" type="submit">Send</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="pt-5 pb-4">
    <div class="container">
      <div class="small text-white-50">
        © <span data-year></span> YourBrand • Footer placeholders
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
